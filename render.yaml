# One-click free hosting on Render (no Docker needed).
# Render injects $PORT; RAMS binds it on 0.0.0.0. Free web services sleep after
# ~15 min idle and cold-start on the next request.
services:
  - type: web
    name: rams
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"   # no third-party deps; no-op
    startCommand: "python -m rams.server --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
